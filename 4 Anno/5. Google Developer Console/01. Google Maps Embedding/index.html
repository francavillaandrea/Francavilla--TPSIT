<!doctype html>

<html lang="it">

    <head>
        <meta charset="utf-8" />

        <title> geolocation </title>

    <body>
        <h1> Collegamento alle google maps </h1>
        <!-- Menù / Condividi e Incorpora / Incorpora Mappa -->
        <!-- viene copiato l'intero IFRAME compresi gli attributi finali-->

        <!-- allowfullscreen (attributo bool dunque senza assegnazione di valori)
	     abilita la possibilità di fullscreen se il contenuto decidesse di usarla
		 Dipende però dal contento. GoogleMaps non dipende da questa feature. -->
        <iframe
            src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d4260.023753834994!2d7.723330515889302!3d44.55150323611137!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1svallauri%20fossano!5e0!3m2!1sit!2sit!4v1771579869914!5m2!1sit!2sit"
            width="600" height="450" style="border:0;" allowfullscreen loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>


    </body>

</html>
