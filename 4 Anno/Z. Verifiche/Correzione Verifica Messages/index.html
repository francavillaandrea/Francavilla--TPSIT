<!doctype html>
<html>

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Vallauri Chat</title>
        <link rel="icon" href="img/icoVallauri.png" type="image/png" />

        <!-- bootstrap -->
        <link rel="stylesheet" href="./lib/bootstrap5/bootstrap.min.css">
        <link rel="stylesheet" href="./lib/bootstrap5/bootstrap-icons.min.css">
        <script src="./lib/bootstrap5/bootstrap.bundle.min.js"> </script>

        <!-- axios.js -->
        <script src="./lib/axios@1.13.min.js"></script>

        <!-- mapLibre -->
        <link rel="stylesheet" href="./lib/mapLibre/dist/maplibre-gl.css" />
        <script src="./lib/mapLibre/dist/maplibre-gl.js"> </script>

        <!-- chart.js -->
        <script src="./lib/chart@4.2.0.umd.min.js"></script>

        <!--user libreries -->
        <script src="./lib/myAxios.js"></script>
        <script src="./lib/myChart.js"></script>
        <script src="./lib/myMapLibre.js"></script>

        <link rel="stylesheet" href="./index.css">
        <script defer src="./index.js"></script>
    </head>

    <body>
        <div class="container">

            <div class="row align-items-center" id="header">
                <div class="col-sm-12 text-center">
                    <img src="img/vallauri.jpg" class="img-fluid">
                </div>
                <div class="col-sm-12">
                    <h1> Vallauri CHAT</h1>
                </div>
            </div>


            <!-- login -->
            <div class="row align-items-center" id="login">
                <div class="col-sm-3"> </div>
                <div class="col-sm-6">
                    <div class="card">
                        <div class="card-header text-center">Login</div>
                        <div class="card-body">
                            <div class="form-group">
                                <label for="username">Username</label>
                                <input type="text" class="form-control" id="username" placeholder="firstname-lastname"
                                    value="Jessica-Martin">
                                <small class="form-text">We'll never share your email with anyone else.</small>
                            </div>
                            <div class="form-group mt-2">
                                <label for="password">Password</label>
                                <input type="password" class="form-control" id="password" placeholder="Password"
                                    value="password">
                            </div>
                            <div class="form-group mt-3">
                                <button type="button" class="btn btn-primary" onclick="return false;">OK</button>
                                <button type="button" class="btn btn-primary">Annulla</button>
                                <span> Credenziali non valide. Riprova ! </span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-3"> </div>
            </div>

            <!-- dettagli -->
            <div class="row">
                <div class="col-sm-8" id="details">
                    <img>
                    <p> <span>Name:</span>
                        <span class="name"> </span>
                    </p>
                    <p> <span>Location:</span>
                        <span class="location"> </span>
                    </p>
                    <p> <span>Coordinate GPS:</span>
                        <span class="gps"> </span>
                    </p>
                    <p> <span>CELL:</span>
                        <span class="cell"> </span>
                    </p>
                    <div id="mapContainer"> </div>
                </div>

                <!-- usersList -->
                <div class="col-sm-4" id="usersList">
                    <div class="row">
                        <div class="col-sm-1"> </div>
                        <div class="col-sm-11"> </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-12">
                            <textarea placeholder="Insert your message" id="txtMessage"></textarea>
                            <br>
                            <button type="button" class="btn btn-primary" id="btnSendMessage"> Send Message</button>
                            <button type="button" class="btn btn-primary" id="btnDrawGraphics"> Draw Graphics</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- modale -->
        <div class="modal fade" id="mdlDiagram" data-bs-backdrop="static" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Messaggi Ricevuti dai followers</h5>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div id="canvas">
                            <canvas> </canvas>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <a href="#" class="btn btn-danger" data-bs-dismiss="modal"> Chiudi </a>
                        <a href="#" class="btn btn-success" download> Salva </a>
                    </div>
                </div>
            </div>
        </div>


    </body>

</html>
