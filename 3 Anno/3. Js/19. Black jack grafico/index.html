<html>

    <head>
        <meta charset="UTF-8">
        <title>Black Jack</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script defer
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
        <link rel="stylesheet" href="index.css" />
        <script defer type="text/javascript" src="index.js"></script>
    </head>

    <body class="bg-dark text-light">
        <div class="container text-center py-5">
            <h1 class="display-4 mb-5">Black Jack</h1>

            <div id="wrapper" class="row justify-content-center">
                <!-- Banco -->
                <div class="col-md-5 text-center mb-5">
                    <h2>Banco</h2>
                    <p class="fs-4">Punti: <span id="puntiB">0</span></p>
                    <div class="d-flex justify-content-center">
                        <div id="cartaB" class="card"></div>
                    </div>
                    <button id="btnB" class="btn btn-danger mt-3">Pescare Carta</button>
                </div>

                <!-- Giocatore -->
                <div class="col-md-5 text-center mb-5">
                    <h2>Giocatore</h2>
                    <p class="fs-4">Punti: <span id="puntiG">0</span></p>
                    <div class="d-flex justify-content-center">
                        <div id="cartaG" class="card"></div>
                    </div>
                    <button id="btnG" class="btn btn-success mt-3">Pescare Carta</button>
                </div>
            </div>

            <div class="row justify-content-center mt-4">
                <div class="col-md-3">
                    <button id="btnReset" class="btn btn-info btn-lg w-100">Nuova Partita</button>
                </div>
            </div>
        </div>
    </body>

</html>
